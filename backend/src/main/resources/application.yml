server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: karma-platform
  profiles:
    default: local
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mvc:
    problemdetails:
      enabled: true

karma:
  frontend-origin: ${KARMA_FRONTEND_ORIGIN:http://localhost:8080}
  jwt:
    issuer: ${KARMA_JWT_ISSUER:karma-platform}
    access-token-minutes: ${KARMA_JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${KARMA_JWT_REFRESH_TOKEN_DAYS:7}
    secret: ${KARMA_JWT_SECRET:karma-platform-local-dev-secret-key-change-me-please}
