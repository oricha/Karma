name: karma-test

services:
  postgres:
    image: postgres:16-alpine
    container_name: karma-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-karma_test}
      POSTGRES_USER: ${DB_USER:-karma}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-karma_test_password}
    ports:
      - "${DB_EXTERNAL_PORT:-5433}:5432"
    volumes:
      - karma_test_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-karma} -d ${DB_NAME:-karma_test}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/oricha/karma-backend:develop}
    container_name: karma-backend-test
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8081}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: test
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-karma_test}
      DB_USER: ${DB_USER:-karma}
      DB_PASSWORD: ${DB_PASSWORD:-karma_test_password}
      KARMA_FRONTEND_ORIGIN: ${KARMA_FRONTEND_ORIGIN:-https://test.karma.example.com}
      KARMA_JWT_SECRET: ${KARMA_JWT_SECRET:-change-me-test}

volumes:
  karma_test_postgres_data:
