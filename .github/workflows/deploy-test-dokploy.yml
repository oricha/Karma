name: Deploy Test to Dokploy

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/karma-backend:develop
            ghcr.io/${{ github.repository_owner }}/karma-backend:${{ github.sha }}

      - name: Trigger Dokploy deployment
        env:
          DOKPLOY_DEPLOY_HOOK_URL: ${{ secrets.DOKPLOY_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DOKPLOY_DEPLOY_HOOK_URL" ]; then
            echo "Missing DOKPLOY_DEPLOY_HOOK_URL secret"
            exit 1
          fi
          curl -fsSL -X POST "$DOKPLOY_DEPLOY_HOOK_URL"
